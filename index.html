<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 궁디팡팡</title>
<style>
  @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    background: linear-gradient(135deg, #f5f0ff 0%, #fef8f0 100%);
    font-family: 'Pretendard', 'Apple SD Gothic Neo', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 12px 32px;
  }

  .wrapper {
    width: 100%;
    max-width: 700px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }

  /* ── 타이틀 ── */
  .title {
    font-size: clamp(1.4rem, 5vw, 2rem);
    font-weight: 800;
    color: #3a2a5e;
    text-align: center;
    letter-spacing: -0.5px;
  }
  .subtitle {
    font-size: clamp(0.75rem, 3vw, 0.95rem);
    color: #7a6a9e;
    text-align: center;
    margin-top: -12px;
  }

  /* ── 카운터 바 ── */
  .counter-bar {
    width: 100%;
    background: rgba(255,255,255,0.75);
    backdrop-filter: blur(8px);
    border-radius: 16px;
    padding: 12px 16px;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 4px;
    flex-wrap: wrap;
    font-size: clamp(0.72rem, 2.8vw, 0.88rem);
    font-weight: 600;
    color: #444;
    box-shadow: 0 2px 12px rgba(120,80,200,0.1);
  }
  .counter-bar span { white-space: nowrap; }
  .counter-bar .sep { color: #ccc; padding: 0 4px; }
  .cnt { font-size: 1.1em; font-weight: 800; }
  .cnt-gemini { color: #9c5cf5; }
  .cnt-gpt    { color: #222; }
  .cnt-claude { color: #e06030; }
  .cnt-total  { color: #3a2a5e; }
  .cnt-label-gemini { color: #9c5cf5; font-weight: 700; }
  .cnt-label-gpt    { color: #222;    font-weight: 700; }
  .cnt-label-claude { color: #e06030; font-weight: 700; }

  /* ── 무대 (단일 카드) ── */
  .stage {
    width: 100%;
    background: #fff;
    border-radius: 28px;
    box-shadow: 0 6px 28px rgba(0,0,0,0.10);
    padding: 28px 20px 20px;
    display: flex;
    flex-direction: row;
    justify-content: space-around;
    align-items: flex-end;
    gap: 8px;
    position: relative;
    overflow: visible; /* 말풍선이 위로 삐져나올 수 있게 */
  }

  /* ── 개별 캐릭터 ── */
  .character {
    flex: 1 1 0;
    min-width: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    position: relative;
    cursor: pointer;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }

  /* ── 캐릭터 이미지 래퍼 ── */
  .char-img-wrap {
    width: 100%;
    position: relative;
    overflow: visible;
  }
  .char-img-wrap img {
    width: 100%;
    height: auto;
    display: block;
    object-fit: contain;
    pointer-events: none;
    user-select: none;
    -webkit-user-drag: none;
    transform-origin: center bottom;
  }

  /* ── 핫존 (하단 45%) ── */
  .hot-zone {
    position: absolute;
    top: 42%;
    bottom: auto;
    left: 15%;
    right: 15%;
    height: 20%;
    pointer-events: none;
  }

  /* ── 이름 라벨 ── */
  .name-tag {
    font-size: clamp(0.65rem, 2.2vw, 0.82rem);
    font-weight: 700;
    letter-spacing: 0.3px;
    text-align: center;
  }
  .character[data-ai="gemini"] .name-tag {
    background: linear-gradient(90deg,#a855f7,#f43f5e);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .character[data-ai="gpt"]    .name-tag { color: #111; }
  .character[data-ai="claude"] .name-tag { color: #e06030; }


  /* ── 배지 (우상단 클릭 수) ── */
  .bang-count {
    position: absolute;
    top: -4px;
    right: -4px;
    font-size: clamp(0.58rem, 1.8vw, 0.72rem);
    font-weight: 800;
    background: rgba(0,0,0,0.08);
    border-radius: 20px;
    padding: 2px 6px;
    z-index: 5;
    pointer-events: none;
  }
  .bang-gemini { color: #a855f7; }
  .bang-gpt    { color: #111; }
  .bang-claude { color: #e06030; }

  /* ── 모바일 ── */
  @media (max-width: 500px) {
    .stage { padding: 20px 10px 14px; gap: 4px; }
  }

  /* ── 이모지 팝 ── */
  .pop {
    position: absolute;
    pointer-events: none;
    font-size: 1.4rem;
    z-index: 20;
    animation: popUp 0.65s ease forwards;
  }
  .pop.pop-weak { font-size: 1rem; opacity: 0.55; }
  @keyframes popUp {
    0%   { opacity: 1;   transform: translateY(0)    scale(1); }
    70%  { opacity: 0.9; transform: translateY(-48px) scale(1.25); }
    100% { opacity: 0;   transform: translateY(-68px) scale(0.85); }
  }

  /* ── 임팩트 손바닥 ── */
  .impact-hand {
    position: absolute;
    pointer-events: none;
    font-size: clamp(1.2rem, 5vw, 1.8rem);
    z-index: 25;
    animation: handPop 0.3s ease forwards;
  }
  @keyframes handPop {
    0%   { opacity: 0; transform: translate(-50%,-50%) scale(0.4) rotate(-20deg); }
    40%  { opacity: 1; transform: translate(-50%,-50%) scale(1.2) rotate(5deg); }
    100% { opacity: 0; transform: translate(-50%,-50%) scale(0.9) rotate(0deg); }
  }

  /* ── 임팩트 원형 마크 ── */
  .impact-circle {
    position: absolute;
    pointer-events: none;
    border-radius: 50%;
    transform: translate(-50%, -50%);
    z-index: 18;
    animation: circleFade 0.6s ease forwards;
  }
  @keyframes circleFade {
    0%   { opacity: 0.85; width: 10px;  height: 10px; }
    60%  { opacity: 0.4;  width: 70px;  height: 70px; }
    100% { opacity: 0;    width: 90px;  height: 90px; }
  }

  /* ── 파티클 ── */
  .particle {
    position: absolute;
    pointer-events: none;
    font-size: clamp(0.7rem, 2.5vw, 1rem);
    z-index: 22;
    animation: particleFly var(--dur, 0.6s) ease forwards;
  }
  @keyframes particleFly {
    0%   { opacity: 1; transform: translate(0,0) scale(1); }
    100% { opacity: 0; transform: translate(var(--tx),var(--ty)) scale(0.4); }
  }

  /* ── "거긴 안돼요" 토스트 ── */
  .toast {
    position: absolute;
    left: 50%;
    white-space: nowrap;
    font-size: clamp(0.6rem, 2.2vw, 0.72rem);
    font-weight: 700;
    color: #fff;
    background: rgba(80,40,120,0.82);
    border-radius: 20px;
    padding: 4px 10px;
    pointer-events: none;
    z-index: 30;
    animation: toastPop 1.1s ease forwards;
  }
  @keyframes toastPop {
    0%   { opacity: 0; top: 30%; transform: translateX(-50%) scale(0.8); }
    15%  { opacity: 1; transform: translateX(-50%) scale(1); }
    70%  { opacity: 1; top: 22%; }
    100% { opacity: 0; top: 16%; transform: translateX(-50%); }
  }

  /* ── 에러 카드 ── */
  .error-card {
    position: absolute;
    bottom: 108%;
    left: 50%;
    transform: translateX(-50%);
    min-width: 190px;
    max-width: min(260px, 88vw);
    padding: 10px 13px 10px 14px;
    background: #fff;
    border-radius: 10px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.14), 0 0 0 1px rgba(0,0,0,0.06);
    font-family: 'Pretendard', 'Apple SD Gothic Neo', sans-serif;
    font-size: clamp(0.6rem, 2vw, 0.72rem);
    line-height: 1.5;
    text-align: left;
    z-index: 200;
    pointer-events: none;
    animation: errorPopIn 0.28s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
  }
  .error-card.fade-out {
    animation: errorFadeOut 0.35s ease forwards;
  }
  /* AI별 좌측 컬러 바 */
  .error-card[data-ai="gemini"] { border-left: 4px solid #7B61FF; }
  .error-card[data-ai="gpt"]    { border-left: 4px solid #111; }
  .error-card[data-ai="claude"] { border-left: 4px solid #e06030; }

  /* Gemini는 카드가 왼쪽으로, Claude는 오른쪽으로 살짝 치우쳐 겹침 방지 */
  .error-card[data-ai="gemini"] { left: 20%; }
  .error-card[data-ai="claude"] { left: 80%; }

  .error-header {
    display: flex;
    align-items: center;
    gap: 5px;
    font-weight: 800;
    font-size: clamp(0.66rem, 2.2vw, 0.8rem);
    margin-bottom: 5px;
    padding-bottom: 5px;
    border-bottom: 1px solid #f0f0f0;
  }
  .error-card[data-ai="gemini"] .error-title { color: #7B61FF; }
  .error-card[data-ai="gpt"]    .error-title { color: #111; }
  .error-card[data-ai="claude"] .error-title { color: #e06030; }

  .error-headline {
    font-weight: 600;
    color: #222;
    margin-bottom: 5px;
    font-size: clamp(0.62rem, 2vw, 0.74rem);
  }
  .error-subtitle {
    font-family: 'SF Mono', Menlo, 'Courier New', monospace;
    font-size: clamp(0.55rem, 1.8vw, 0.66rem);
    color: #888;
    margin-bottom: 4px;
  }
  .error-bullets {
    list-style: none;
    padding: 0; margin: 0;
    color: #555;
  }
  .error-bullets li {
    position: relative;
    padding-left: 11px;
    margin-bottom: 1px;
    font-size: clamp(0.58rem, 1.9vw, 0.7rem);
  }
  .error-bullets li::before { content: '•'; position: absolute; left: 0; color: #bbb; }
  .error-footer {
    margin-top: 5px;
    padding-top: 5px;
    border-top: 1px solid #f0f0f0;
    font-size: clamp(0.54rem, 1.7vw, 0.64rem);
    color: #aaa;
    font-style: italic;
  }

  @keyframes errorPopIn {
    from { opacity: 0; transform: translateX(-50%) translateY(8px) scale(0.88); }
    to   { opacity: 1; transform: translateX(-50%) translateY(0)   scale(1); }
  }
  @keyframes errorFadeOut {
    to { opacity: 0; transform: translateX(-50%) translateY(-16px) scale(0.94); }
  }
  /* Gemini/Claude는 left가 다르므로 keyframe도 별도 */
  .error-card[data-ai="gemini"] { animation-name: errorPopInLeft; }
  .error-card[data-ai="claude"] { animation-name: errorPopInRight; }
  @keyframes errorPopInLeft {
    from { opacity: 0; transform: translateX(-20%) translateY(8px) scale(0.88); }
    to   { opacity: 1; transform: translateX(-20%) translateY(0)   scale(1); }
  }
  @keyframes errorPopInRight {
    from { opacity: 0; transform: translateX(-80%) translateY(8px) scale(0.88); }
    to   { opacity: 1; transform: translateX(-80%) translateY(0)   scale(1); }
  }
  .error-card[data-ai="gemini"].fade-out { animation-name: errorFadeOutLeft; }
  .error-card[data-ai="claude"].fade-out { animation-name: errorFadeOutRight; }
  @keyframes errorFadeOutLeft {
    to { opacity: 0; transform: translateX(-20%) translateY(-16px) scale(0.94); }
  }
  @keyframes errorFadeOutRight {
    to { opacity: 0; transform: translateX(-80%) translateY(-16px) scale(0.94); }
  }

  /* ── 핫존 밖 클릭 토스트 ── */
  .wrong-toast {
    position: absolute;
    bottom: 108%;
    left: 50%;
    transform: translateX(-50%);
    white-space: nowrap;
    font-family: 'Pretendard', 'Apple SD Gothic Neo', sans-serif;
    font-size: clamp(0.6rem, 2vw, 0.72rem);
    font-weight: 700;
    color: #fff;
    background: rgba(90,60,130,0.82);
    border-radius: 20px;
    padding: 4px 11px;
    pointer-events: none;
    z-index: 200;
    animation: wrongToast 1s ease forwards;
  }
  @keyframes wrongToast {
    0%   { opacity: 0; transform: translateX(-50%) scale(0.85); }
    15%  { opacity: 1; transform: translateX(-50%) scale(1); }
    75%  { opacity: 1; }
    100% { opacity: 0; transform: translateX(-50%) translateY(-12px); }
  }


  /* ── 콤보 오버레이 ── */
  .combo-overlay {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.5);
    pointer-events: none;
    z-index: 300;
    text-align: center;
    animation: comboShow 0.8s cubic-bezier(0.34,1.56,0.64,1) forwards;
  }
  .combo-overlay .combo-num {
    font-size: clamp(3rem, 14vw, 5.5rem);
    font-weight: 900;
    color: #fff;
    text-shadow: 0 0 30px rgba(255,160,0,0.9), 0 4px 0 rgba(0,0,0,0.3);
    line-height: 1;
    letter-spacing: -2px;
  }
  .combo-overlay .combo-label {
    font-size: clamp(1rem, 5vw, 1.8rem);
    font-weight: 800;
    color: #ffe066;
    text-shadow: 0 2px 8px rgba(0,0,0,0.4);
    margin-top: 4px;
  }
  @keyframes comboShow {
    0%   { opacity: 0; transform: translate(-50%,-50%) scale(0.4) rotate(-6deg); }
    50%  { opacity: 1; transform: translate(-50%,-50%) scale(1.08) rotate(2deg); }
    70%  { transform: translate(-50%,-50%) scale(1) rotate(0deg); }
    85%  { opacity: 1; }
    100% { opacity: 0; transform: translate(-50%,-50%) scale(0.85) rotate(0deg); }
  }

  /* ── 랭킹 모달: 1위 코멘트 ── */
  .rank-comment {
    font-size: 0.78rem;
    color: #e06030;
    font-weight: 700;
    margin-top: 2px;
  }

  /* ── 컨트롤 ── */
  .controls {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .btn {
    font-family: inherit;
    font-size: clamp(0.75rem, 2.8vw, 0.88rem);
    font-weight: 700;
    padding: 10px 18px;
    border: none;
    border-radius: 30px;
    cursor: pointer;
    touch-action: manipulation;
    transition: transform 0.1s, box-shadow 0.1s;
    box-shadow: 0 3px 12px rgba(0,0,0,0.12);
  }
  .btn:active { transform: scale(0.95); }
  .btn-reset  { background: #fff; color: #555; border: 2px solid #ddd; }
  .btn-rank   { background: linear-gradient(135deg,#f7971e,#ffd200); color: #333; }

  /* ── 랭킹 모달 ── */
  .modal-bg {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.45);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  .modal-bg.open { display: flex; }
  .modal {
    background: #fff;
    border-radius: 24px;
    padding: 28px 24px;
    width: min(90vw, 340px);
    box-shadow: 0 8px 40px rgba(0,0,0,0.2);
    text-align: center;
  }
  .modal h2 { font-size: 1.2rem; font-weight: 800; color: #3a2a5e; margin-bottom: 20px; }
  .rank-list { list-style: none; display: flex; flex-direction: column; gap: 12px; }
  .rank-item {
    display: flex; align-items: center; gap: 12px;
    background: #f8f5ff; border-radius: 14px; padding: 10px 14px;
  }
  .rank-num  { font-size: 1.3rem; width: 28px; text-align: center; }
  .rank-name { flex: 1; font-weight: 700; font-size: 0.95rem; text-align: left; }
  .rank-score { font-weight: 800; font-size: 1rem; }
  .score-gemini { color: #a855f7; }
  .score-gpt    { color: #111; }
  .score-claude { color: #e06030; }
  .btn-close {
    margin-top: 20px;
    font-family: inherit;
    font-size: 0.88rem;
    font-weight: 700;
    padding: 9px 28px;
    border: none;
    border-radius: 30px;
    background: #3a2a5e;
    color: #fff;
    cursor: pointer;
  }
</style>
</head>
<body>

<div class="wrapper" id="main-wrapper">
  <h1 class="title">AI 궁디팡팡 🖐️</h1>
  <p class="subtitle">Gemini, GPT, Claude 골고루 때려주세요</p>

  <!-- 카운터 바 -->
  <div class="counter-bar">
    <span class="cnt-label cnt-label-gemini">Gemini <span class="cnt cnt-gemini" id="cnt-gemini">0</span></span>
    <span class="sep">|</span>
    <span class="cnt-label cnt-label-gpt">GPT <span class="cnt cnt-gpt" id="cnt-gpt">0</span></span>
    <span class="sep">|</span>
    <span class="cnt-label cnt-label-claude">Claude <span class="cnt cnt-claude" id="cnt-claude">0</span></span>
    <span class="sep">|</span>
    <span>합계 <span class="cnt cnt-total" id="cnt-total">0</span></span>
  </div>

  <!-- 단일 무대 -->
  <div class="stage">

    <!-- Gemini -->
    <div class="character" data-ai="gemini">
      <div class="char-img-wrap">
        <img src="images/ge.png" alt="Gemini" draggable="false">
        <div class="hot-zone"></div>
      </div>
      <span class="name-tag">Gemini</span>
      <span class="bang-count bang-gemini" id="badge-gemini">0</span>
    </div>

    <!-- GPT -->
    <div class="character" data-ai="gpt">
      <div class="char-img-wrap">
        <img src="images/g.png" alt="GPT" draggable="false">
        <div class="hot-zone"></div>
      </div>
      <span class="name-tag">GPT</span>
      <span class="bang-count bang-gpt" id="badge-gpt">0</span>
    </div>

    <!-- Claude -->
    <div class="character" data-ai="claude">
      <div class="char-img-wrap">
        <img src="images/c.png" alt="Claude" draggable="false">
        <div class="hot-zone"></div>
      </div>
      <span class="name-tag">Claude</span>
      <span class="bang-count bang-claude" id="badge-claude">0</span>
    </div>

  </div>

  <!-- 컨트롤 -->
  <div class="controls">
    <button class="btn btn-reset" onclick="resetAll()">🔄 전체 리셋</button>
    <button class="btn btn-rank"  onclick="openRank()">🏆 랭킹 보기</button>
  </div>
</div>

<!-- 랭킹 모달 -->
<div class="modal-bg" id="modal-bg" onclick="closeRankOutside(event)">
  <div class="modal">
    <h2>🏆 팡팡 랭킹</h2>
    <p style="font-size:0.8rem;color:#7a6a9e;margin-top:-14px;margin-bottom:16px;font-weight:600;">오늘 가장 많이 맞은 AI는?</p>
    <ul class="rank-list" id="rank-list"></ul>
    <button class="btn-close" onclick="closeRank()">닫기</button>
  </div>
</div>

<script>
'use strict';

/* ════════════════════════════════
   상태
════════════════════════════════ */
const counts = { gemini: 0, gpt: 0, claude: 0 };

const EMOJIS = {
  gemini: { hot: ['💎','🌈','✨','⚡','💜'], weak: ['😅','🤚','👋'] },
  gpt:    { hot: ['⚫','🤖','💻','🧠','💥'], weak: ['😅','🤚','👋'] },
  claude: { hot: ['🟠','🔥','💫','🌟','👊'], weak: ['😅','🤚','👋'] },
};

/* AI별 사운드 피치 (Hz) */
const PITCH = { gemini: 520, gpt: 340, claude: 240 };

/* 임팩트 원 색상 */
const IMPACT_COLOR = {
  gemini: 'radial-gradient(circle, rgba(168,85,247,0.6) 0%, rgba(244,63,94,0.0) 70%)',
  gpt:    'radial-gradient(circle, rgba(30,30,30,0.45)  0%, rgba(0,0,0,0.0)       70%)',
  claude: 'radial-gradient(circle, rgba(224,96,48,0.6)  0%, rgba(224,96,48,0.0)   70%)',
};

/* ════════════════════════════════
   Web Audio "팡!" 사운드
════════════════════════════════ */
let _audioCtx = null;
function getAudioCtx() {
  if (!_audioCtx) _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return _audioCtx;
}

function playBang(name) {
  try {
    const ctx  = getAudioCtx();
    const freq = PITCH[name] ?? 380;

    /* 짧은 삼각파 버스트 */
    const osc  = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);

    osc.type = 'triangle';
    osc.frequency.setValueAtTime(freq, ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(freq * 0.4, ctx.currentTime + 0.18);

    gain.gain.setValueAtTime(0.55, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.22);

    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 0.22);
  } catch (_) { /* AudioContext 미지원 무시 */ }
}

/* ════════════════════════════════
   핫존 판정 — img 기준 하단 45%
════════════════════════════════ */
function isHotZone(char, clientX, clientY) {
  /* .hot-zone 엘리먼트의 실제 화면 좌표를 직접 읽음
     → CSS top/height만 바꾸면 JS 수정 없이 자동 동기화 */
  const zone = char.querySelector('.hot-zone');
  const r    = zone.getBoundingClientRect();
  return (
    clientY >= r.top    && clientY <= r.bottom &&
    clientX >= r.left   && clientX <= r.right
  );
}

/* ════════════════════════════════
   이벤트 등록
════════════════════════════════ */
document.querySelectorAll('.character').forEach(char => {
  char.addEventListener('click', e => {
    handleInput(char, e.clientX, e.clientY);
  });

  char.addEventListener('touchstart', e => {
    e.preventDefault();
    char.classList.add('touching');
    const t = e.changedTouches[0];
    handleInput(char, t.clientX, t.clientY);
  }, { passive: false });

  char.addEventListener('touchend', () => char.classList.remove('touching'));
});

/* ════════════════════════════════
   메인 핸들러
════════════════════════════════ */
function handleInput(card, clientX, clientY) {
  const name  = card.dataset.ai;
  const hot   = isHotZone(card, clientX, clientY);
  const rect  = card.getBoundingClientRect();
  const ox    = clientX - rect.left;   /* 카드 기준 X */
  const oy    = clientY - rect.top;    /* 카드 기준 Y */

  if (hot) {
    counts[name]++;
    updateUI();
    updateCombo(name);

    playBang(name);
    if (navigator.vibrate) navigator.vibrate(60);

    animateShake(card);
    animateSquash(card);
    spawnImpactHand(card, ox, oy);
    spawnImpactCircle(card, ox, oy, name);
    spawnParticles(card, ox, oy);
    spawnPop(card, ox, oy, name, true);
    spawnBubble(card, name, true);

  } else {
    /* 콤보 끊기 */
    if (combo.name === name) resetCombo();
    spawnPop(card, ox, oy, name, false);
    spawnBubble(card, name, false);
  }
}


/* ════════════════════════════════
   콤보 시스템
════════════════════════════════ */
const combo = { name: null, count: 0, timer: null };
const COMBO_MILESTONES = new Set([5, 10, 20]);

function updateCombo(name) {
  if (combo.name !== name) {
    /* 다른 AI 클릭 → 콤보 리셋 후 새로 시작 */
    resetCombo();
    combo.name = name;
  }
  combo.count++;
  clearTimeout(combo.timer);

  if (COMBO_MILESTONES.has(combo.count)) {
    showCombo(combo.count);
  }

  /* 0.8초 무입력 시 리셋 */
  combo.timer = setTimeout(resetCombo, 800);
}

function resetCombo() {
  combo.name  = null;
  combo.count = 0;
  clearTimeout(combo.timer);
  combo.timer = null;
}

function showCombo(n) {
  const el = document.createElement('div');
  el.className = 'combo-overlay';
  el.innerHTML = `<div class="combo-num">${n}</div><div class="combo-label">COMBO! 🔥</div>`;
  document.body.appendChild(el);
  el.addEventListener('animationend', () => el.remove());
}

/* ════════════════════════════════
   1. 카드 흔들림
════════════════════════════════ */
function animateShake(card) {
  if (card._shakeAnim) card._shakeAnim.cancel();
  card._shakeAnim = card.animate([
    { transform: 'translateX(0)'    },
    { transform: 'translateX(-6px)' },
    { transform: 'translateX(6px)'  },
    { transform: 'translateX(-3px)' },
    { transform: 'translateX(3px)'  },
    { transform: 'translateX(0)'    },
  ], {
    duration: 400,
    easing: 'cubic-bezier(0.36, 0.07, 0.19, 0.97)',
    fill: 'none',
  });
  card._shakeAnim.onfinish = () => { card._shakeAnim = null; };
}

/* ════════════════════════════════
   2. 이미지 squash + shake
════════════════════════════════ */
function animateSquash(card) {
  const img = card.querySelector('img');
  if (img._squashAnim) img._squashAnim.cancel();
  if (img._shakeAnim)  img._shakeAnim.cancel();

  /* squash */
  img._squashAnim = img.animate([
    { transform: 'scaleY(1)    scaleX(1)' },
    { transform: 'scaleY(0.85) scaleX(1.12)', offset: 0.15 },
    { transform: 'scaleY(1)    scaleX(1)' },
  ], {
    duration: 300,
    easing: 'cubic-bezier(0.34, 1.56, 0.64, 1)',
    fill: 'none',
  });

  /* 이미지 shake (더 큰 진폭) */
  img._shakeAnim = img.animate([
    { transform: 'translateX(0)    scaleY(1) scaleX(1)' },
    { transform: 'translateX(-10px) scaleY(0.95) scaleX(1.05)', offset: 0.1 },
    { transform: 'translateX(10px)  scaleY(0.97) scaleX(1.03)', offset: 0.3 },
    { transform: 'translateX(-5px)  scaleY(1)    scaleX(1)',    offset: 0.6 },
    { transform: 'translateX(5px)   scaleY(1)    scaleX(1)',    offset: 0.8 },
    { transform: 'translateX(0)     scaleY(1)    scaleX(1)' },
  ], {
    duration: 400,
    easing: 'cubic-bezier(0.36, 0.07, 0.19, 0.97)',
    fill: 'none',
  });

  img._squashAnim.onfinish = () => { img._squashAnim = null; };
  img._shakeAnim.onfinish  = () => { img._shakeAnim  = null; };
}

/* ════════════════════════════════
   3a. 임팩트 손바닥 🖐️
════════════════════════════════ */
function spawnImpactHand(card, ox, oy) {

}

/* ════════════════════════════════

════════════════════════════════ */
function spawnImpactCircle(card, ox, oy, name) {

/* ════════════════════════════════
   4. 파티클 5~6개
════════════════════════════════ */
const PARTICLES = ['✨','💥','💢','⭐','🌟','💫'];

function spawnParticles(card, ox, oy) {
  const count = 5 + Math.round(Math.random());
  for (let i = 0; i < count; i++) {
    const el  = document.createElement('span');
    el.className = 'particle';

    const angle  = (360 / count) * i + Math.random() * 30 - 15;
    const dist   = 45 + Math.random() * 35;
    const rad    = angle * Math.PI / 180;
    const tx     = Math.round(Math.cos(rad) * dist);
    const ty     = Math.round(Math.sin(rad) * dist);
    const dur    = (0.45 + Math.random() * 0.25).toFixed(2) + 's';

    el.textContent = PARTICLES[Math.floor(Math.random() * PARTICLES.length)];
    el.style.setProperty('--tx', tx + 'px');
    el.style.setProperty('--ty', ty + 'px');
    el.style.setProperty('--dur', dur);
    el.style.left         = (ox - 10) + 'px';
    el.style.top          = (oy - 10) + 'px';
    el.style.animationDelay = (Math.random() * 0.06).toFixed(3) + 's';
    el.style.fontSize     = (0.65 + Math.random() * 0.5) + 'rem';

    card.appendChild(el);
    el.addEventListener('animationend', () => el.remove());
  }
}

/* ════════════════════════════════
   이모지 팝 (카운트 이펙트)
════════════════════════════════ */
function spawnPop(card, ox, oy, name, hot) {
  const el   = document.createElement('span');
  el.className = 'pop' + (hot ? '' : ' pop-weak');
  const pool = EMOJIS[name][hot ? 'hot' : 'weak'];
  el.textContent = pool[Math.floor(Math.random() * pool.length)];
  el.style.left  = (ox - 14) + 'px';
  el.style.top   = (oy - 14) + 'px';
  card.appendChild(el);
  el.addEventListener('animationend', () => el.remove());
}

const WRONG_SPOT = ['거긴 안돼요!', '엉덩이를 때려주세요', '거기 말고 밑에!'];
const _lastCardIdx = { gemini: -1, gpt: -1, claude: -1 };
const _lastWrongIdx = -1;
let _wrongIdx = -1;

function pickRandom(arr, lastRef, key) {
  if (arr.length === 1) return arr[0];
  let idx;
  const last = key ? _lastCardIdx[key] : _wrongIdx;
  do { idx = Math.floor(Math.random() * arr.length); } while (idx === last);
  if (key) _lastCardIdx[key] = idx; else _wrongIdx = idx;
  return arr[idx];
}

/* ════════════════════════════════
   에러 카드 생성
════════════════════════════════ */
function spawnBubble(char, name, isHot) {
  if (!isHot) {
    spawnWrongToast(char);
    return;
  }

  /* 기존 카드 있으면 즉시 제거 (연타 시 덮어쓰기) */
  const existing = char.querySelector('.error-card');
  if (existing) existing.remove();

  const data = pickRandom(ERROR_CARDS[name], null, name);
  const card = document.createElement('div');
  card.className = 'error-card';
  card.dataset.ai = name;

  let html = `<div class="error-header">
    <span class="error-icon">${data.icon}</span>
    <span class="error-title">${data.title}</span>
  </div>`;
  if (data.subtitle) html += `<div class="error-subtitle">${data.subtitle}</div>`;
  if (data.headline) html += `<div class="error-headline">${data.headline}</div>`;
  html += '<ul class="error-bullets">';
  data.bullets.forEach(b => { html += `<li>${b}</li>`; });
  html += '</ul>';
  if (data.footer) html += `<div class="error-footer">${data.footer}</div>`;

  card.innerHTML = html;
  char.appendChild(card);

  /* 2.5초 유지 후 페이드아웃 */
  setTimeout(() => {
    card.classList.add('fade-out');
    setTimeout(() => card.remove(), 350);
  }, 2500);
}

/* 핫존 밖 클릭 — 작은 토스트 */
function spawnWrongToast(char) {
  const existing = char.querySelector('.wrong-toast');
  if (existing) existing.remove();
  const msg = pickRandom(WRONG_SPOT, null, null);
  const el = document.createElement('span');
  el.className = 'wrong-toast';
  el.textContent = msg;
  char.appendChild(el);
  el.addEventListener('animationend', () => el.remove());
}

    document.getElementById('cnt-'   + n).textContent = counts[n];
    document.getElementById('badge-' + n).textContent = counts[n];
  });

}

function resetAll() {
  if (!confirm('팡팡 기록을 모두 리셋할까요?')) return;
  counts.gemini = counts.gpt = counts.claude = 0;
  resetCombo();
  updateUI();
}


/* ════════════════════════════════
   랭킹
════════════════════════════════ */
function openRank() {
  const sorted = Object.entries(counts).sort((a,b) => b[1]-a[1]);
  const medals = ['🥇','🥈','🥉'];
  const labels = { gemini:'Gemini', gpt:'GPT', claude:'Claude' };
  const scoreClass = { gemini:'score-gemini', gpt:'score-gpt', claude:'score-claude' };
  const total = counts.gemini + counts.gpt + counts.claude;

  document.getElementById('rank-list').innerHTML = sorted.map(([name, score], i) => {
    const pct = total > 0 ? Math.round(score / total * 100) : 0;
    const comment = i === 0 && score > 0
      ? `<div class="rank-comment">오늘의 샌드백 👑</div>` : '';
    return `
    <li class="rank-item">
      <span class="rank-num">${medals[i]}</span>
      <div style="flex:1;text-align:left;">
        <div class="rank-name">${labels[name]}</div>
        ${comment}
      </div>
      <span class="rank-score ${scoreClass[name]}">${score} 팡 <span style="font-size:0.75em;opacity:0.7">(${pct}%)</span></span>
    </li>`;
  }).join('');

  document.getElementById('modal-bg').classList.add('open');
}
function closeRank() { document.getElementById('modal-bg').classList.remove('open'); }
function closeRankOutside(e) {
  if (e.target === document.getElementById('modal-bg')) closeRank();
}
