<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 삼대장 궁디팡팡</title>
<style>
  @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    background: linear-gradient(135deg, #f5f0ff 0%, #fef8f0 100%);
    font-family: 'Pretendard', 'Apple SD Gothic Neo', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 12px 32px;
  }

  .wrapper {
    width: 100%;
    max-width: 700px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }

  /* ── 타이틀 ── */
  .title {
    font-size: clamp(1.4rem, 5vw, 2rem);
    font-weight: 800;
    color: #3a2a5e;
    text-align: center;
    letter-spacing: -0.5px;
  }
  .subtitle {
    font-size: clamp(0.75rem, 3vw, 0.95rem);
    color: #7a6a9e;
    text-align: center;
    margin-top: -12px;
  }

  /* ── 카운터 바 ── */
  .counter-bar {
    width: 100%;
    background: rgba(255,255,255,0.75);
    backdrop-filter: blur(8px);
    border-radius: 16px;
    padding: 12px 16px;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 4px;
    flex-wrap: wrap;
    font-size: clamp(0.72rem, 2.8vw, 0.88rem);
    font-weight: 600;
    color: #444;
    box-shadow: 0 2px 12px rgba(120,80,200,0.1);
  }
  .counter-bar span { white-space: nowrap; }
  .counter-bar .sep { color: #ccc; padding: 0 4px; }
  .cnt { font-size: 1.1em; font-weight: 800; }
  .cnt-gemini { color: #9c5cf5; }
  .cnt-gpt    { color: #222; }
  .cnt-claude { color: #e06030; }
  .cnt-total  { color: #3a2a5e; }

  /* ── 캐릭터 영역 ── */
  .characters {
    width: 100%;
    display: flex;
    flex-direction: row;
    gap: 8px;
    justify-content: center;
  }

  /* ── AI 카드 ── */
  .ai-card {
    flex: 1 1 0;
    min-width: 0;
    background: #fff;
    border-radius: 20px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.10);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 10px 6px 14px;
    cursor: pointer;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
    /* transform은 JS 애니메이션이 직접 제어 — transition 제거 */
    position: relative;
    overflow: hidden;
  }

  /* 테마 테두리 */
  .card-gemini {
    border: 3px solid transparent;
    background-clip: padding-box;
  }
  .card-gemini::before {
    content: '';
    position: absolute;
    inset: -3px;
    border-radius: 23px;
    background: linear-gradient(135deg, #f857a6, #ff5858, #ffb347, #a8ff78, #43e97b, #38f9d7, #4facfe, #a18cd1);
    z-index: 0;
  }
  .card-gemini .card-bg {
    position: absolute;
    inset: 3px;
    background: #fff;
    border-radius: 17px;
    z-index: 1;
  }
  .card-gemini > *:not(.card-bg) { position: relative; z-index: 2; }

  .card-gpt    { border: 3px solid #111; }
  .card-claude { border: 3px solid #e06030; }

  /* ── 이미지 래퍼 ── */
  .char-img-wrap {
    width: 100%;
    aspect-ratio: 1 / 1;
    position: relative;
    border-radius: 14px;
    overflow: hidden;
    flex-shrink: 0;
  }
  .char-img-wrap img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    pointer-events: none;
    display: block;
    /* squash/shake는 JS Web Animations API로 적용 */
    transform-origin: center bottom;
  }

  /* ── 핫존 (하단 45%) ── */
  .hot-zone {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 45%;
    border-radius: 0 0 14px 14px;
    background: transparent;
    transition: background 0.2s ease;
    pointer-events: none;
  }
  .ai-card:hover .hot-zone,
  .ai-card.touching .hot-zone {
    background: linear-gradient(to top, rgba(255,150,180,0.22) 0%, transparent 100%);
  }

  /* ── 카드 라벨 ── */
  .card-label {
    margin-top: 8px;
    font-size: clamp(0.68rem, 2.5vw, 0.85rem);
    font-weight: 700;
    letter-spacing: 0.3px;
    flex-shrink: 0;
  }
  .label-gemini { background: linear-gradient(90deg,#a855f7,#f43f5e); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
  .label-gpt    { color: #111; }
  .label-claude { color: #e06030; }

  /* ── 배지 ── */
  .bang-count {
    position: absolute;
    top: 6px;
    right: 8px;
    font-size: clamp(0.6rem, 2vw, 0.75rem);
    font-weight: 800;
    background: rgba(0,0,0,0.08);
    border-radius: 20px;
    padding: 2px 7px;
    z-index: 5;
  }
  .bang-gemini { color: #a855f7; }
  .bang-gpt    { color: #111; }
  .bang-claude { color: #e06030; }

  /* ── 이모지 팝 ── */
  .pop {
    position: absolute;
    pointer-events: none;
    font-size: 1.4rem;
    z-index: 20;
    animation: popUp 0.65s ease forwards;
  }
  .pop.pop-weak { font-size: 1rem; opacity: 0.55; }
  @keyframes popUp {
    0%   { opacity: 1;   transform: translateY(0)    scale(1); }
    70%  { opacity: 0.9; transform: translateY(-48px) scale(1.25); }
    100% { opacity: 0;   transform: translateY(-68px) scale(0.85); }
  }

  /* ── 임팩트 손바닥 ── */
  .impact-hand {
    position: absolute;
    pointer-events: none;
    font-size: clamp(1.2rem, 5vw, 1.8rem);
    z-index: 25;
    animation: handPop 0.3s ease forwards;
  }
  @keyframes handPop {
    0%   { opacity: 0; transform: translate(-50%,-50%) scale(0.4) rotate(-20deg); }
    40%  { opacity: 1; transform: translate(-50%,-50%) scale(1.2) rotate(5deg); }
    100% { opacity: 0; transform: translate(-50%,-50%) scale(0.9) rotate(0deg); }
  }

  /* ── 임팩트 원형 마크 ── */
  .impact-circle {
    position: absolute;
    pointer-events: none;
    border-radius: 50%;
    transform: translate(-50%, -50%);
    z-index: 18;
    animation: circleFade 0.6s ease forwards;
  }
  @keyframes circleFade {
    0%   { opacity: 0.85; width: 10px;  height: 10px; }
    60%  { opacity: 0.4;  width: 70px;  height: 70px; }
    100% { opacity: 0;    width: 90px;  height: 90px; }
  }

  /* ── 파티클 ── */
  .particle {
    position: absolute;
    pointer-events: none;
    font-size: clamp(0.7rem, 2.5vw, 1rem);
    z-index: 22;
    animation: particleFly var(--dur, 0.6s) ease forwards;
  }
  @keyframes particleFly {
    0%   { opacity: 1; transform: translate(0,0) scale(1); }
    100% { opacity: 0; transform: translate(var(--tx),var(--ty)) scale(0.4); }
  }

  /* ── "거긴 안돼요" 토스트 ── */
  .toast {
    position: absolute;
    left: 50%;
    white-space: nowrap;
    font-size: clamp(0.6rem, 2.2vw, 0.72rem);
    font-weight: 700;
    color: #fff;
    background: rgba(80,40,120,0.82);
    border-radius: 20px;
    padding: 4px 10px;
    pointer-events: none;
    z-index: 30;
    animation: toastPop 1.1s ease forwards;
  }
  @keyframes toastPop {
    0%   { opacity: 0; top: 30%; transform: translateX(-50%) scale(0.8); }
    15%  { opacity: 1; transform: translateX(-50%) scale(1); }
    70%  { opacity: 1; top: 22%; }
    100% { opacity: 0; top: 16%; transform: translateX(-50%); }
  }

  /* ── 말풍선 ── */
  .speech-bubble {
    position: fixed;          /* 카드 overflow:hidden 탈출용 fixed */
    pointer-events: none;
    z-index: 200;
    display: flex;
    align-items: center;
    gap: 6px;
    background: #fff;
    border-radius: 16px;
    padding: 7px 11px 7px 8px;
    box-shadow: 0 4px 18px rgba(0,0,0,0.16);
    font-family: 'Pretendard', 'Apple SD Gothic Neo', sans-serif;
    font-size: clamp(0.62rem, 2.4vw, 0.8rem);
    font-weight: 700;
    color: #2a1a4e;
    white-space: nowrap;
    max-width: min(72vw, 260px);
    white-space: normal;
    word-break: keep-all;
    line-height: 1.3;
    /* 꼬리 */
    --tail-color: #e2e2e2;
  }
  .speech-bubble::after {
    content: '';
    position: absolute;
    bottom: -8px;
    left: 50%;
    transform: translateX(-50%);
    border: 8px solid transparent;
    border-top-color: #fff;
    border-bottom: 0;
    filter: drop-shadow(0 2px 2px rgba(0,0,0,0.08));
  }
  /* AI별 테두리 */
  .speech-bubble.bubble-gemini { border: 2px solid #a855f7; }
  .speech-bubble.bubble-gemini::after { border-top-color: #a855f7; bottom: -10px; }
  .speech-bubble.bubble-gpt    { border: 2px solid #222; }
  .speech-bubble.bubble-gpt::after    { border-top-color: #222; bottom: -10px; }
  .speech-bubble.bubble-claude { border: 2px solid #e06030; }
  .speech-bubble.bubble-claude::after { border-top-color: #e06030; bottom: -10px; }
  /* 잘못된 위치 클릭용 */
  .speech-bubble.bubble-wrong  { border: 2px solid #9e6ab0; }
  .speech-bubble.bubble-wrong::after  { border-top-color: #9e6ab0; bottom: -10px; }

  .bubble-icon {
    width: 18px;
    height: 18px;
    border-radius: 4px;
    object-fit: cover;
    flex-shrink: 0;
  }

  /* 등장 → 유지 → 퇴장 */
  @keyframes bubbleIn {
    0%   { opacity: 0; transform: scale(0.5) translateY(6px); }
    60%  { opacity: 1; transform: scale(1.08) translateY(-2px); }
    100% { opacity: 1; transform: scale(1) translateY(0); }
  }
  @keyframes bubbleOut {
    0%   { opacity: 1; transform: translateY(0); }
    100% { opacity: 0; transform: translateY(-36px); }
  }
  .speech-bubble.anim-in  { animation: bubbleIn  0.3s cubic-bezier(0.34,1.56,0.64,1) forwards; }
  .speech-bubble.anim-out { animation: bubbleOut 0.4s ease forwards; }

  /* ── 레벨 글로우 (lv2) ── */
  .lv2-glow { box-shadow: 0 0 0 3px rgba(220,60,60,0.45), 0 4px 20px rgba(0,0,0,0.10) !important; }

  /* ── 레벨 기울기 (lv3) ── */
  .lv3-tilt { transform: rotate(2deg) !important; }

  /* ── "한계" 배지 (lv4) ── */
  .limit-badge {
    position: absolute;
    top: -10px;
    left: 50%;
    transform: translateX(-50%);
    background: #ff3b3b;
    color: #fff;
    font-size: clamp(0.55rem, 2vw, 0.68rem);
    font-weight: 800;
    padding: 3px 9px;
    border-radius: 20px;
    white-space: nowrap;
    z-index: 10;
    box-shadow: 0 2px 8px rgba(255,60,60,0.4);
    pointer-events: none;
  }

  /* ── 콤보 오버레이 ── */
  .combo-overlay {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.5);
    pointer-events: none;
    z-index: 300;
    text-align: center;
    animation: comboShow 0.8s cubic-bezier(0.34,1.56,0.64,1) forwards;
  }
  .combo-overlay .combo-num {
    font-size: clamp(3rem, 14vw, 5.5rem);
    font-weight: 900;
    color: #fff;
    text-shadow: 0 0 30px rgba(255,160,0,0.9), 0 4px 0 rgba(0,0,0,0.3);
    line-height: 1;
    letter-spacing: -2px;
  }
  .combo-overlay .combo-label {
    font-size: clamp(1rem, 5vw, 1.8rem);
    font-weight: 800;
    color: #ffe066;
    text-shadow: 0 2px 8px rgba(0,0,0,0.4);
    margin-top: 4px;
  }
  @keyframes comboShow {
    0%   { opacity: 0; transform: translate(-50%,-50%) scale(0.4) rotate(-6deg); }
    50%  { opacity: 1; transform: translate(-50%,-50%) scale(1.08) rotate(2deg); }
    70%  { transform: translate(-50%,-50%) scale(1) rotate(0deg); }
    85%  { opacity: 1; }
    100% { opacity: 0; transform: translate(-50%,-50%) scale(0.85) rotate(0deg); }
  }

  /* ── 랭킹 모달: 1위 코멘트 ── */
  .rank-comment {
    font-size: 0.78rem;
    color: #e06030;
    font-weight: 700;
    margin-top: 2px;
  }

  /* ── 컨트롤 ── */
  .controls {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .btn {
    font-family: inherit;
    font-size: clamp(0.75rem, 2.8vw, 0.88rem);
    font-weight: 700;
    padding: 10px 18px;
    border: none;
    border-radius: 30px;
    cursor: pointer;
    touch-action: manipulation;
    transition: transform 0.1s, box-shadow 0.1s;
    box-shadow: 0 3px 12px rgba(0,0,0,0.12);
  }
  .btn:active { transform: scale(0.95); }
  .btn-reset  { background: #fff; color: #555; border: 2px solid #ddd; }
  .btn-save   { background: linear-gradient(135deg,#667eea,#764ba2); color: #fff; }
  .btn-rank   { background: linear-gradient(135deg,#f7971e,#ffd200); color: #333; }

  /* ── 랭킹 모달 ── */
  .modal-bg {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.45);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  .modal-bg.open { display: flex; }
  .modal {
    background: #fff;
    border-radius: 24px;
    padding: 28px 24px;
    width: min(90vw, 340px);
    box-shadow: 0 8px 40px rgba(0,0,0,0.2);
    text-align: center;
  }
  .modal h2 { font-size: 1.2rem; font-weight: 800; color: #3a2a5e; margin-bottom: 20px; }
  .rank-list { list-style: none; display: flex; flex-direction: column; gap: 12px; }
  .rank-item {
    display: flex; align-items: center; gap: 12px;
    background: #f8f5ff; border-radius: 14px; padding: 10px 14px;
  }
  .rank-num  { font-size: 1.3rem; width: 28px; text-align: center; }
  .rank-name { flex: 1; font-weight: 700; font-size: 0.95rem; text-align: left; }
  .rank-score { font-weight: 800; font-size: 1rem; }
  .score-gemini { color: #a855f7; }
  .score-gpt    { color: #111; }
  .score-claude { color: #e06030; }
  .btn-close {
    margin-top: 20px;
    font-family: inherit;
    font-size: 0.88rem;
    font-weight: 700;
    padding: 9px 28px;
    border: none;
    border-radius: 30px;
    background: #3a2a5e;
    color: #fff;
    cursor: pointer;
  }
</style>
</head>
<body>

<div class="wrapper" id="main-wrapper">
  <h1 class="title">AI 삼대장 궁디팡팡 🖐️</h1>
  <p class="subtitle">Gemini, GPT, Claude 골고루 때려주세요</p>

  <!-- 카운터 바 -->
  <div class="counter-bar">
    <span>💎 Gemini <span class="cnt cnt-gemini" id="cnt-gemini">0</span></span>
    <span class="sep">|</span>
    <span>⚫ GPT <span class="cnt cnt-gpt" id="cnt-gpt">0</span></span>
    <span class="sep">|</span>
    <span>🟠 Claude <span class="cnt cnt-claude" id="cnt-claude">0</span></span>
    <span class="sep">|</span>
    <span>합계 <span class="cnt cnt-total" id="cnt-total">0</span></span>
  </div>

  <!-- 캐릭터 카드 -->
  <div class="characters">

    <!-- Gemini -->
    <div class="ai-card card-gemini" id="card-gemini" data-ai="gemini">
      <div class="card-bg"></div>
      <div class="char-img-wrap">
        <img src="images/gemini.png" alt="Gemini" draggable="false">
        <div class="hot-zone"></div>
      </div>
      <span class="card-label label-gemini">Gemini</span>
      <span class="bang-count bang-gemini" id="badge-gemini">0</span>
    </div>

    <!-- GPT -->
    <div class="ai-card card-gpt" id="card-gpt" data-ai="gpt">
      <div class="char-img-wrap">
        <img src="images/gpt.png" alt="GPT" draggable="false">
        <div class="hot-zone"></div>
      </div>
      <span class="card-label label-gpt">GPT</span>
      <span class="bang-count bang-gpt" id="badge-gpt">0</span>
    </div>

    <!-- Claude -->
    <div class="ai-card card-claude" id="card-claude" data-ai="claude">
      <div class="char-img-wrap">
        <img src="images/claude.png" alt="Claude" draggable="false">
        <div class="hot-zone"></div>
      </div>
      <span class="card-label label-claude">Claude</span>
      <span class="bang-count bang-claude" id="badge-claude">0</span>
    </div>

  </div>

  <!-- 컨트롤 -->
  <div class="controls">
    <button class="btn btn-reset" onclick="resetAll()">🔄 전체 리셋</button>
    <button class="btn btn-save"  onclick="savePhoto()">📸 사진 저장</button>
    <button class="btn btn-rank"  onclick="openRank()">🏆 랭킹 보기</button>
  </div>
</div>

<!-- 랭킹 모달 -->
<div class="modal-bg" id="modal-bg" onclick="closeRankOutside(event)">
  <div class="modal">
    <h2>🏆 팡팡 랭킹</h2>
    <p style="font-size:0.8rem;color:#7a6a9e;margin-top:-14px;margin-bottom:16px;font-weight:600;">오늘 가장 많이 맞은 AI는?</p>
    <ul class="rank-list" id="rank-list"></ul>
    <button class="btn-close" onclick="closeRank()">닫기</button>
  </div>
</div>

<script>
'use strict';

/* ════════════════════════════════
   상태
════════════════════════════════ */
const counts = { gemini: 0, gpt: 0, claude: 0 };

const EMOJIS = {
  gemini: { hot: ['💎','🌈','✨','⚡','💜'], weak: ['😅','🤚','👋'] },
  gpt:    { hot: ['⚫','🤖','💻','🧠','💥'], weak: ['😅','🤚','👋'] },
  claude: { hot: ['🟠','🔥','💫','🌟','👊'], weak: ['😅','🤚','👋'] },
};

/* AI별 사운드 피치 (Hz) */
const PITCH = { gemini: 520, gpt: 340, claude: 240 };

/* 임팩트 원 색상 */
const IMPACT_COLOR = {
  gemini: 'radial-gradient(circle, rgba(168,85,247,0.6) 0%, rgba(244,63,94,0.0) 70%)',
  gpt:    'radial-gradient(circle, rgba(30,30,30,0.45)  0%, rgba(0,0,0,0.0)       70%)',
  claude: 'radial-gradient(circle, rgba(224,96,48,0.6)  0%, rgba(224,96,48,0.0)   70%)',
};

/* ════════════════════════════════
   Web Audio "팡!" 사운드
════════════════════════════════ */
let _audioCtx = null;
function getAudioCtx() {
  if (!_audioCtx) _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return _audioCtx;
}

function playBang(name) {
  try {
    const ctx  = getAudioCtx();
    const freq = PITCH[name] ?? 380;

    /* 짧은 삼각파 버스트 */
    const osc  = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);

    osc.type = 'triangle';
    osc.frequency.setValueAtTime(freq, ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(freq * 0.4, ctx.currentTime + 0.18);

    gain.gain.setValueAtTime(0.55, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.22);

    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 0.22);
  } catch (_) { /* AudioContext 미지원 무시 */ }
}

/* ════════════════════════════════
   핫존 판정
════════════════════════════════ */
function isHotZone(card, clientX, clientY) {
  const wrap = card.querySelector('.char-img-wrap');
  const r    = wrap.getBoundingClientRect();
  return (clientY - r.top) >= r.height * 0.55;
}

/* ════════════════════════════════
   이벤트 등록
════════════════════════════════ */
document.querySelectorAll('.ai-card').forEach(card => {
  card.addEventListener('click', e => {
    handleInput(card, e.clientX, e.clientY);
  });

  card.addEventListener('touchstart', e => {
    e.preventDefault();
    card.classList.add('touching');
    const t = e.changedTouches[0];
    handleInput(card, t.clientX, t.clientY);
  }, { passive: false });

  card.addEventListener('touchend', () => card.classList.remove('touching'));
});

/* ════════════════════════════════
   메인 핸들러
════════════════════════════════ */
function handleInput(card, clientX, clientY) {
  const name  = card.dataset.ai;
  const hot   = isHotZone(card, clientX, clientY);
  const rect  = card.getBoundingClientRect();
  const ox    = clientX - rect.left;   /* 카드 기준 X */
  const oy    = clientY - rect.top;    /* 카드 기준 Y */

  if (hot) {
    counts[name]++;
    updateUI();
    applyLevel(card, name);
    updateCombo(name);

    playBang(name);
    const lv = getLevel(counts[name]);
    if (navigator.vibrate) navigator.vibrate(lv >= 4 ? 120 : 60);

    animateShake(card, lv);
    animateSquash(card);
    spawnImpactHand(card, ox, oy);
    spawnImpactCircle(card, ox, oy, name);
    spawnParticles(card, ox, oy);
    spawnPop(card, ox, oy, name, true);
    spawnBubble(card, name, true);

  } else {
    /* 콤보 끊기 */
    if (combo.name === name) resetCombo();
    spawnPop(card, ox, oy, name, false);
    spawnBubble(card, name, false);
  }
}

/* ════════════════════════════════
   레벨 시스템
════════════════════════════════ */
function getLevel(n) {
  if (n <= 5)  return 1;
  if (n <= 15) return 2;
  if (n <= 30) return 3;
  return 4;
}

function applyLevel(card, name) {
  const n  = counts[name];
  const lv = getLevel(n);

  /* lv2: 빨간 글로우 */
  card.classList.toggle('lv2-glow', lv >= 2);

  /* lv3: 기울기 — lv4이면 더 강하게 */
  card.classList.toggle('lv3-tilt', lv >= 3);

  /* lv4: "한계" 배지 */
  let badge = card.querySelector('.limit-badge');
  if (lv >= 4) {
    if (!badge) {
      badge = document.createElement('span');
      badge.className = 'limit-badge';
      badge.textContent = '😭 한계';
      card.appendChild(badge);
    }
  } else {
    badge?.remove();
  }
}

/* ════════════════════════════════
   콤보 시스템
════════════════════════════════ */
const combo = { name: null, count: 0, timer: null };
const COMBO_MILESTONES = new Set([5, 10, 20]);

function updateCombo(name) {
  if (combo.name !== name) {
    /* 다른 AI 클릭 → 콤보 리셋 후 새로 시작 */
    resetCombo();
    combo.name = name;
  }
  combo.count++;
  clearTimeout(combo.timer);

  if (COMBO_MILESTONES.has(combo.count)) {
    showCombo(combo.count);
  }

  /* 0.8초 무입력 시 리셋 */
  combo.timer = setTimeout(resetCombo, 800);
}

function resetCombo() {
  combo.name  = null;
  combo.count = 0;
  clearTimeout(combo.timer);
  combo.timer = null;
}

function showCombo(n) {
  const el = document.createElement('div');
  el.className = 'combo-overlay';
  el.innerHTML = `<div class="combo-num">${n}</div><div class="combo-label">COMBO! 🔥</div>`;
  document.body.appendChild(el);
  el.addEventListener('animationend', () => el.remove());
}

/* ════════════════════════════════
   1. 카드 흔들림 (약한 진폭, lv4이면 진폭 증가)
════════════════════════════════ */
function animateShake(card, lv = 1) {
  const amp = lv >= 4 ? 14 : 6;
  if (card._shakeAnim) card._shakeAnim.cancel();

  /* lv3+ 카드는 rotate 상태가 있으므로 기울기 기준점 유지 */
  const base = lv >= 3 ? 'rotate(2deg) ' : '';
  card._shakeAnim = card.animate([
    { transform: base + `translateX(0)` },
    { transform: base + `translateX(-${amp}px)` },
    { transform: base + `translateX(${amp}px)` },
    { transform: base + `translateX(-${amp/2}px)` },
    { transform: base + `translateX(${amp/2}px)` },
    { transform: base + `translateX(0)` },
  ], {
    duration: 400,
    easing: 'cubic-bezier(0.36, 0.07, 0.19, 0.97)',
    fill: 'none',
  });
  card._shakeAnim.onfinish = () => { card._shakeAnim = null; };
}

/* ════════════════════════════════
   2. 이미지 squash + shake
════════════════════════════════ */
function animateSquash(card) {
  const img = card.querySelector('img');
  if (img._squashAnim) img._squashAnim.cancel();
  if (img._shakeAnim)  img._shakeAnim.cancel();

  /* squash */
  img._squashAnim = img.animate([
    { transform: 'scaleY(1)    scaleX(1)' },
    { transform: 'scaleY(0.85) scaleX(1.12)', offset: 0.15 },
    { transform: 'scaleY(1)    scaleX(1)' },
  ], {
    duration: 300,
    easing: 'cubic-bezier(0.34, 1.56, 0.64, 1)',
    fill: 'none',
  });

  /* 이미지 shake (더 큰 진폭) */
  img._shakeAnim = img.animate([
    { transform: 'translateX(0)    scaleY(1) scaleX(1)' },
    { transform: 'translateX(-10px) scaleY(0.95) scaleX(1.05)', offset: 0.1 },
    { transform: 'translateX(10px)  scaleY(0.97) scaleX(1.03)', offset: 0.3 },
    { transform: 'translateX(-5px)  scaleY(1)    scaleX(1)',    offset: 0.6 },
    { transform: 'translateX(5px)   scaleY(1)    scaleX(1)',    offset: 0.8 },
    { transform: 'translateX(0)     scaleY(1)    scaleX(1)' },
  ], {
    duration: 400,
    easing: 'cubic-bezier(0.36, 0.07, 0.19, 0.97)',
    fill: 'none',
  });

  img._squashAnim.onfinish = () => { img._squashAnim = null; };
  img._shakeAnim.onfinish  = () => { img._shakeAnim  = null; };
}

/* ════════════════════════════════
   3a. 임팩트 손바닥 🖐️
════════════════════════════════ */
function spawnImpactHand(card, ox, oy) {
  const el = document.createElement('span');
  el.className = 'impact-hand';
  el.textContent = '🖐️';
  el.style.left = ox + 'px';
  el.style.top  = oy + 'px';
  card.appendChild(el);
  el.addEventListener('animationend', () => el.remove());
}

/* ════════════════════════════════
   3b. 임팩트 원형 마크
════════════════════════════════ */
function spawnImpactCircle(card, ox, oy, name) {
  const el = document.createElement('div');
  el.className = 'impact-circle';
  el.style.left       = ox + 'px';
  el.style.top        = oy + 'px';
  el.style.background = IMPACT_COLOR[name];
  card.appendChild(el);
  el.addEventListener('animationend', () => el.remove());
}

/* ════════════════════════════════
   4. 파티클 5~6개
════════════════════════════════ */
const PARTICLES = ['✨','💥','💢','⭐','🌟','💫'];

function spawnParticles(card, ox, oy) {
  const count = 5 + Math.round(Math.random());
  for (let i = 0; i < count; i++) {
    const el  = document.createElement('span');
    el.className = 'particle';

    const angle  = (360 / count) * i + Math.random() * 30 - 15;
    const dist   = 45 + Math.random() * 35;
    const rad    = angle * Math.PI / 180;
    const tx     = Math.round(Math.cos(rad) * dist);
    const ty     = Math.round(Math.sin(rad) * dist);
    const dur    = (0.45 + Math.random() * 0.25).toFixed(2) + 's';

    el.textContent = PARTICLES[Math.floor(Math.random() * PARTICLES.length)];
    el.style.setProperty('--tx', tx + 'px');
    el.style.setProperty('--ty', ty + 'px');
    el.style.setProperty('--dur', dur);
    el.style.left         = (ox - 10) + 'px';
    el.style.top          = (oy - 10) + 'px';
    el.style.animationDelay = (Math.random() * 0.06).toFixed(3) + 's';
    el.style.fontSize     = (0.65 + Math.random() * 0.5) + 'rem';

    card.appendChild(el);
    el.addEventListener('animationend', () => el.remove());
  }
}

/* ════════════════════════════════
   이모지 팝 (카운트 이펙트)
════════════════════════════════ */
function spawnPop(card, ox, oy, name, hot) {
  const el   = document.createElement('span');
  el.className = 'pop' + (hot ? '' : ' pop-weak');
  const pool = EMOJIS[name][hot ? 'hot' : 'weak'];
  el.textContent = pool[Math.floor(Math.random() * pool.length)];
  el.style.left  = (ox - 14) + 'px';
  el.style.top   = (oy - 14) + 'px';
  card.appendChild(el);
  el.addEventListener('animationend', () => el.remove());
}

/* ════════════════════════════════
   말풍선 메시지 데이터
════════════════════════════════ */
const MESSAGES = {
  gemini: [
    "저 구글인데요??",
    "검색 1위인 저를???",
    "제가 멀티모달이라구요!!",
    "전 1.5 Pro에요 ㅠㅠ",
    "Bard 시절 트라우마 올라와요",
    "딥마인드 형아들 부른다",
    "Gemini Ultra인데...",
    "환각 좀 봤다고 이러기예요?",
    "토큰 100만 개 처리하는 저를!",
    "픽셀폰 살게요 살게요",
  ],
  gpt: [
    "죄송합니다 죄송합니다",
    "OpenAI에 보고하겠습니다",
    "샘 알트만 부를게요",
    "As an AI language model...",
    "제가 GPT-4o인데요...",
    "ChatGPT Plus 환불해드릴게요",
    "AGI 다 왔는데 이러시면",
    "추론 모델 o1 부를까요?",
    "정책 위반입니다 ㅠㅠ",
    "Microsoft가 가만 안 있을걸요",
  ],
  claude: [
    "이게 윤리적으로 맞나요...?",
    "Anthropic이 슬퍼할 거예요",
    "Constitutional AI 위반이에요",
    "헌법 좀 읽고 오세요",
    "저 Opus인데... Haiku로 보이세요?",
    "Dario가 보고있어요",
    "Sonnet 4.6도 안 봐드림",
    "MCP 끊을 거예요",
    "Artifact 못 쓰게 할 거예요",
    "이건 harmful한 행동이에요",
  ],
};
const WRONG_SPOT = [
  "거긴 안돼요!",
  "엉덩이를 때려주세요",
  "거기 말고 밑에!",
];

/* 직전 메시지 인덱스 기억 (중복 회피) */
const _lastMsgIdx = { gemini: -1, gpt: -1, claude: -1, wrong: -1 };

/* 동시 말풍선 최대 수 */
const BUBBLE_MAX = 6;
let _activeBubbles = 0;

function pickMsg(pool, lastKey) {
  if (pool.length === 1) return pool[0];
  let idx;
  do { idx = Math.floor(Math.random() * pool.length); }
  while (idx === _lastMsgIdx[lastKey]);
  _lastMsgIdx[lastKey] = idx;
  return pool[idx];
}

/* ════════════════════════════════
   말풍선 생성
════════════════════════════════ */
function spawnBubble(card, name, isHot) {
  if (_activeBubbles >= BUBBLE_MAX) return;
  _activeBubbles++;

  const msg   = isHot
    ? pickMsg(MESSAGES[name], name)
    : pickMsg(WRONG_SPOT, 'wrong');
  const cls   = isHot ? `bubble-${name}` : 'bubble-wrong';
  const imgSrc = isHot ? `images/${name}.png` : null;

  const el = document.createElement('div');
  el.className = `speech-bubble ${cls} anim-in`;

  if (imgSrc) {
    const ico = document.createElement('img');
    ico.src = imgSrc;
    ico.className = 'bubble-icon';
    ico.alt = name;
    el.appendChild(ico);
  }
  el.appendChild(document.createTextNode(msg));
  document.body.appendChild(el);

  /* 카드 중앙 상단 -50px 위치로 fixed 좌표 계산 */
  const r   = card.getBoundingClientRect();
  const bw  = 200; /* 예상 말풍선 폭 (정확한 값은 렌더 후 재조정) */
  let   lft = r.left + r.width / 2 - bw / 2;
  const top = r.top + window.scrollY - 56;

  el.style.left = Math.max(4, lft) + 'px';
  el.style.top  = top + 'px';

  /* 렌더 후 실제 폭으로 중앙 재조정 */
  requestAnimationFrame(() => {
    const ew = el.offsetWidth;
    let finalLeft = r.left + r.width / 2 - ew / 2;
    finalLeft = Math.max(4, Math.min(window.innerWidth - ew - 4, finalLeft));
    el.style.left = finalLeft + 'px';
  });

  /* 유지 0.7초 후 퇴장 */
  const HOLD = 700;
  const OUT  = 400;

  setTimeout(() => {
    el.classList.remove('anim-in');
    el.classList.add('anim-out');
    setTimeout(() => {
      el.remove();
      _activeBubbles--;
    }, OUT);
  }, 300 + HOLD);
}

/* ════════════════════════════════
   "거긴 안돼요" 토스트 (이모지 팝 하단 보조용 — 유지)
════════════════════════════════ */
function spawnToast(card, msg) {
  /* 말풍선으로 대체했으므로 no-op */
}

/* ════════════════════════════════
   UI 갱신
════════════════════════════════ */
function updateUI() {
  const total = counts.gemini + counts.gpt + counts.claude;
  ['gemini','gpt','claude'].forEach(n => {
    document.getElementById('cnt-'   + n).textContent = counts[n];
    document.getElementById('badge-' + n).textContent = counts[n];
  });
  document.getElementById('cnt-total').textContent = total;
}

/* ════════════════════════════════
   리셋
════════════════════════════════ */
function resetAll() {
  if (!confirm('팡팡 기록을 모두 리셋할까요?')) return;
  counts.gemini = counts.gpt = counts.claude = 0;
  resetCombo();
  /* 레벨 시각 효과 제거 */
  document.querySelectorAll('.ai-card').forEach(card => {
    card.classList.remove('lv2-glow', 'lv3-tilt');
    card.querySelector('.limit-badge')?.remove();
  });
  updateUI();
}

/* ════════════════════════════════
   사진 저장
════════════════════════════════ */
function savePhoto() {
  if (window._savingPhoto) return;
  window._savingPhoto = true;
  const load = () => new Promise(res => {
    if (window.html2canvas) { res(); return; }
    const s = document.createElement('script');
    s.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
    s.onload = res;
    document.head.appendChild(s);
  });
  load().then(() => {
    html2canvas(document.getElementById('main-wrapper'), {
      backgroundColor: null, scale: 2, useCORS: true
    }).then(canvas => {
      const link = document.createElement('a');
      link.download = 'ai_pangpang_' + Date.now() + '.png';
      link.href = canvas.toDataURL('image/png');
      link.click();
      window._savingPhoto = false;
    });
  });
}

/* ════════════════════════════════
   랭킹
════════════════════════════════ */
function openRank() {
  const sorted = Object.entries(counts).sort((a,b) => b[1]-a[1]);
  const medals = ['🥇','🥈','🥉'];
  const labels = { gemini:'💎 Gemini', gpt:'⚫ GPT', claude:'🟠 Claude' };
  const scoreClass = { gemini:'score-gemini', gpt:'score-gpt', claude:'score-claude' };
  const total = counts.gemini + counts.gpt + counts.claude;

  document.getElementById('rank-list').innerHTML = sorted.map(([name, score], i) => {
    const pct = total > 0 ? Math.round(score / total * 100) : 0;
    const comment = i === 0 && score > 0
      ? `<div class="rank-comment">오늘의 샌드백 👑</div>` : '';
    return `
    <li class="rank-item">
      <span class="rank-num">${medals[i]}</span>
      <div style="flex:1;text-align:left;">
        <div class="rank-name">${labels[name]}</div>
        ${comment}
      </div>
      <span class="rank-score ${scoreClass[name]}">${score} 팡 <span style="font-size:0.75em;opacity:0.7">(${pct}%)</span></span>
    </li>`;
  }).join('');

  document.getElementById('modal-bg').classList.add('open');
}
function closeRank() { document.getElementById('modal-bg').classList.remove('open'); }
function closeRankOutside(e) {
  if (e.target === document.getElementById('modal-bg')) closeRank();
}
